name: macd-td-index-strategy



services:
  # --- 数据库服务 ---
  postgres-db:
    image: postgres:16
    container_name: vnpy_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vnpy}
    volumes:
      # 挂载数据卷，保证数据持久化
      - postgres_data:/var/lib/postgresql/data
      # 挂载初始化脚本（方案 B）
      - ./init_data:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # 开发期暴露：宿主机5433 -> 容器5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vnpy}"]
      timeout: 20s
      retries: 10

  # --- 监控面板 ---
  dashboard:
    build: 
      context: ..  # 上下文设为项目根目录
      dockerfile: deploy/Dockerfile
    container_name: vnpy_dashboard
    command: python src/web/app.py
    ports:
      - "5007:5007"
    environment:
      - VNPY_DATABASE_DRIVER=postgresql
      - VNPY_DATABASE_HOST=postgres-db
      - VNPY_DATABASE_PORT=5432
      - VNPY_DATABASE_USER=${POSTGRES_USER:-postgres}
      - VNPY_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - VNPY_DATABASE_DATABASE=${POSTGRES_DB:-vnpy}
    volumes:
      - ../logs:/app/logs  # 挂载日志
    depends_on:
      postgres-db:
        condition: service_healthy

  # --- 15分钟策略 ---
  strategy-15m:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: vnpy_strategy_15m
    # 核心：直接指定启动 15m 的配置
    command: python src/main/main.py --mode daemon --config config/strategy_config.yaml --override-config config/timeframe/15m.yaml
    environment:
      - VNPY_DATABASE_DRIVER=postgresql
      - VNPY_DATABASE_HOST=postgres-db
      - VNPY_DATABASE_PORT=5432
      - VNPY_DATABASE_USER=${POSTGRES_USER:-postgres}
      - VNPY_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - VNPY_DATABASE_DATABASE=${POSTGRES_DB:-vnpy}
    volumes:
      - ../logs:/app/logs
      # 挂载 config 目录，允许微调配置不重启
      - ../config:/app/config
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  postgres_data:
