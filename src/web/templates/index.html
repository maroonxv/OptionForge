<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>期权策略监控台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-0: #050b12;
            --bg-1: #0d1724;
            --panel-bg: rgba(16, 28, 41, 0.84);
            --panel-strong: rgba(21, 36, 52, 0.96);
            --panel-frost: rgba(22, 36, 52, 0.55);
            --border-soft: rgba(130, 184, 227, 0.18);
            --border-strong: rgba(130, 184, 227, 0.32);
            --text-primary: #e6f3ff;
            --text-secondary: #97aec2;
            --text-dim: #71889b;
            --accent-cyan: #2ed3ff;
            --accent-amber: #ffc96a;
            --accent-green: #4ee38c;
            --accent-red: #ff7575;
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --shadow-main: 0 26px 54px rgba(1, 8, 16, 0.58);
            --shadow-soft: 0 12px 30px rgba(2, 10, 20, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-primary);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(1100px circle at 88% -8%, rgba(46, 211, 255, 0.22), transparent 58%),
                radial-gradient(780px circle at -8% 24%, rgba(255, 201, 106, 0.15), transparent 54%),
                linear-gradient(138deg, var(--bg-0), var(--bg-1));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            opacity: 0.25;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 1), transparent 85%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.08;
            background: repeating-linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.12) 0,
                rgba(255, 255, 255, 0.12) 1px,
                transparent 1px,
                transparent 4px
            );
        }

        .dashboard-shell {
            max-width: 1880px;
        }

        .animate-rise {
            opacity: 0;
            transform: translateY(16px) scale(0.99);
            animation: rise-in 0.65s cubic-bezier(.18, .75, .28, 1) forwards;
        }

        .delay-1 { animation-delay: 0.06s; }
        .delay-2 { animation-delay: 0.14s; }
        .delay-3 { animation-delay: 0.22s; }
        .delay-4 { animation-delay: 0.30s; }

        @keyframes rise-in {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero-panel,
        .surface-card {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-xl);
            background: linear-gradient(155deg, rgba(21, 35, 49, 0.93), rgba(14, 24, 36, 0.9));
            box-shadow: var(--shadow-main);
            position: relative;
            overflow: hidden;
        }

        .hero-panel::before,
        .surface-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            pointer-events: none;
            border-radius: inherit;
            background: linear-gradient(125deg, rgba(46, 211, 255, 0.25), transparent 30%, transparent 70%, rgba(255, 201, 106, 0.2));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            padding: 1px;
            opacity: 0.65;
        }

        .hero-panel {
            padding: 1.35rem;
            display: flex;
            gap: 1.35rem;
            justify-content: space-between;
            align-items: stretch;
            flex-wrap: wrap;
            margin-bottom: 1.1rem;
        }

        .hero-main {
            flex: 1 1 420px;
            min-width: 320px;
        }

        .eyebrow {
            margin: 0 0 0.6rem;
            color: var(--accent-cyan);
            letter-spacing: 0.16em;
            font-size: 0.68rem;
            font-family: "IBM Plex Mono", monospace;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: "Noto Serif SC", serif;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: clamp(1.65rem, 1.25rem + 1vw, 2.25rem);
        }

        .hero-meta {
            margin-top: 0.95rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.65rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 117, 117, 0.4);
            background: rgba(255, 117, 117, 0.14);
            color: #ffb8b8;
            transition: all 0.3s ease;
        }

        .live-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
        }

        .live-indicator.is-live {
            border-color: rgba(78, 227, 140, 0.4);
            background: rgba(78, 227, 140, 0.13);
            color: #8df6b7;
        }

        .update-time {
            color: var(--text-secondary);
            font-size: 0.83rem;
            letter-spacing: 0.02em;
        }

        .hero-controls {
            flex: 1 1 500px;
            min-width: 320px;
            border: 1px solid rgba(143, 182, 212, 0.18);
            border-radius: var(--radius-lg);
            background: var(--panel-frost);
            backdrop-filter: blur(10px);
            display: grid;
            gap: 0.9rem;
            padding: 0.95rem 1rem;
            align-content: start;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(120px, 1fr));
            gap: 0.75rem;
        }

        .control-field {
            display: grid;
            gap: 0.28rem;
        }

        .control-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-family: "IBM Plex Mono", monospace;
        }

        .form-select {
            border: 1px solid rgba(131, 177, 209, 0.26);
            background-color: rgba(8, 16, 26, 0.9);
            color: var(--text-primary);
            border-radius: 11px;
            padding-top: 0.42rem;
            padding-bottom: 0.42rem;
            font-size: 0.87rem;
        }

        .form-select:focus {
            border-color: rgba(46, 211, 255, 0.75);
            box-shadow: 0 0 0 0.16rem rgba(46, 211, 255, 0.2);
            background-color: rgba(10, 20, 32, 0.95);
            color: var(--text-primary);
        }

        .control-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.85rem;
            flex-wrap: wrap;
            border-top: 1px solid rgba(131, 177, 209, 0.18);
            padding-top: 0.7rem;
        }

        .btn-refresh {
            border: 1px solid rgba(46, 211, 255, 0.45);
            color: #cbf6ff;
            background: linear-gradient(138deg, rgba(46, 211, 255, 0.28), rgba(46, 211, 255, 0.1));
            border-radius: 10px;
            font-size: 0.84rem;
            letter-spacing: 0.03em;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 0.4rem 0.9rem;
        }

        .btn-refresh:hover {
            color: #ecfbff;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(46, 211, 255, 0.22);
        }

        .switch-row {
            display: inline-flex;
            gap: 0.58rem;
            align-items: center;
        }

        #auto-refresh-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .form-check-input {
            width: 2.35em;
            height: 1.2em;
            border: 1px solid rgba(129, 168, 198, 0.45);
            background-color: rgba(86, 109, 128, 0.5);
            cursor: pointer;
            margin-top: 0;
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 0.16rem rgba(46, 211, 255, 0.2);
            border-color: rgba(46, 211, 255, 0.68);
        }

        .form-check-input:checked {
            border-color: rgba(78, 227, 140, 0.75);
            background-color: var(--accent-green);
        }

        .surface-card {
            border-radius: var(--radius-xl);
            margin-bottom: 1rem;
        }

        .surface-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.05rem 1.15rem 0.95rem;
            border-bottom: 1px solid rgba(131, 177, 209, 0.17);
        }

        .surface-head h2,
        .surface-head h3 {
            margin: 0;
            font-size: 1.04rem;
            font-family: "Noto Serif SC", serif;
            letter-spacing: 0.02em;
        }

        .metric-cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .metric-chip {
            min-width: 78px;
            padding: 0.46rem 0.68rem;
            border-radius: 12px;
            border: 1px solid rgba(127, 166, 197, 0.22);
            background: rgba(9, 18, 30, 0.7);
            display: grid;
            gap: 0.12rem;
            text-align: center;
        }

        .metric-chip span {
            color: var(--text-dim);
            font-size: 0.68rem;
            letter-spacing: 0.03em;
        }

        .metric-chip strong {
            color: var(--text-primary);
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.95rem;
            line-height: 1;
        }

        .chart-shell {
            padding: 0.75rem 0.85rem 0.7rem;
            position: relative;
        }

        .chart-shell::after {
            content: "";
            position: absolute;
            inset: 0.75rem 0.85rem 0.7rem;
            pointer-events: none;
            border-radius: 16px;
            border: 1px solid rgba(130, 184, 227, 0.12);
            background: linear-gradient(180deg, rgba(13, 22, 34, 0.28), rgba(11, 19, 30, 0.05));
        }

        #chart-container {
            width: 100%;
            height: min(72vh, 770px);
            min-height: 430px;
        }

        .side-stack .surface-card {
            border-radius: var(--radius-lg);
            background: linear-gradient(156deg, rgba(19, 33, 46, 0.95), rgba(11, 21, 31, 0.9));
            box-shadow: var(--shadow-soft);
        }

        .table-wrap {
            max-height: 360px;
            overflow-y: auto;
        }

        .table {
            margin: 0;
            color: var(--text-primary);
            border-color: rgba(127, 166, 197, 0.2);
            font-size: 0.84rem;
        }

        .table thead th {
            font-size: 0.71rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            background: rgba(14, 24, 37, 0.96);
            border-bottom-color: rgba(127, 166, 197, 0.22);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .table td,
        .table th {
            padding: 0.56rem 0.62rem;
            vertical-align: middle;
            border-color: rgba(127, 166, 197, 0.14);
            white-space: nowrap;
        }

        .table tbody tr:nth-of-type(odd) {
            background: rgba(7, 16, 27, 0.34);
        }

        .table tbody tr:hover {
            background: rgba(46, 211, 255, 0.08);
        }

        .status-tag {
            border-radius: 999px;
            border: 1px solid transparent;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.66rem;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.5rem;
        }

        .status-live {
            color: #7fd7ff;
            background: rgba(46, 211, 255, 0.15);
            border-color: rgba(46, 211, 255, 0.36);
        }

        .status-filled {
            color: #9cf8bd;
            background: rgba(78, 227, 140, 0.16);
            border-color: rgba(78, 227, 140, 0.35);
        }

        .status-cancel {
            color: #ffe3b0;
            background: rgba(255, 201, 106, 0.18);
            border-color: rgba(255, 201, 106, 0.34);
        }

        .status-reject {
            color: #ffb2b2;
            background: rgba(255, 117, 117, 0.16);
            border-color: rgba(255, 117, 117, 0.35);
        }

        .text-success {
            color: var(--accent-green) !important;
        }

        .text-danger {
            color: var(--accent-red) !important;
        }

        .text-muted {
            color: var(--text-secondary) !important;
        }

        .sys-grid {
            display: grid;
            gap: 0.68rem;
        }

        .sys-item {
            border: 1px solid rgba(127, 166, 197, 0.2);
            border-radius: 12px;
            background: rgba(8, 16, 27, 0.58);
            padding: 0.58rem 0.65rem;
            display: grid;
            gap: 0.2rem;
        }

        .sys-item span {
            color: var(--text-secondary);
            font-size: 0.73rem;
            letter-spacing: 0.03em;
        }

        code {
            color: var(--accent-amber);
            background: rgba(255, 201, 106, 0.12);
            border: 1px solid rgba(255, 201, 106, 0.22);
            padding: 0.24rem 0.45rem;
            border-radius: 8px;
            font-size: 0.73rem;
            font-family: "IBM Plex Mono", monospace;
            word-break: break-all;
        }

        .empty-row {
            color: var(--text-secondary);
            text-align: center;
            padding: 0.75rem 0.4rem;
        }

        .row-direction {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.73rem;
            letter-spacing: 0.02em;
        }

        .table-wrap::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: rgba(6, 14, 23, 0.5);
        }

        .table-wrap::-webkit-scrollbar-thumb {
            background: rgba(130, 184, 227, 0.32);
            border-radius: 999px;
        }

        @media (max-width: 1199.98px) {
            .hero-panel {
                padding: 1.1rem;
            }

            #chart-container {
                height: min(62vh, 620px);
                min-height: 380px;
            }

            .table-wrap {
                max-height: 300px;
            }
        }

        @media (max-width: 991.98px) {
            .control-grid {
                grid-template-columns: 1fr;
            }

            .surface-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .metric-cluster {
                width: 100%;
            }

            .metric-chip {
                flex: 1 1 calc(33.33% - 0.5rem);
            }
        }

        @media (max-width: 767.98px) {
            .dashboard-shell {
                padding-left: 0.55rem;
                padding-right: 0.55rem;
            }

            .hero-panel {
                margin-bottom: 0.85rem;
            }

            .surface-head,
            .chart-shell {
                padding-left: 0.72rem;
                padding-right: 0.72rem;
            }

            #chart-container {
                min-height: 325px;
            }

            .decision-grid {
                display: grid;
                grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.9fr);
                gap: 1rem;
            }

            .decision-focus {
                min-height: 100%;
                background: linear-gradient(180deg, rgba(9, 15, 27, 0.88), rgba(6, 10, 18, 0.96));
                border: 1px solid rgba(114, 145, 174, 0.16);
                border-radius: 18px;
                padding: 1.05rem 1rem;
            }

            .decision-focus-head {
                display: flex;
                justify-content: space-between;
                gap: 1rem;
                align-items: flex-start;
                margin-bottom: 0.85rem;
            }

            .decision-focus-title {
                display: flex;
                flex-direction: column;
                gap: 0.28rem;
            }

            .decision-kicker {
                font-size: 0.74rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #7d92a8;
            }

            .decision-focus-title h4 {
                margin: 0;
                font-size: 1rem;
                font-weight: 700;
                color: #eef6ff;
            }

            .decision-trace-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 0.45rem;
                justify-content: flex-end;
            }

            .decision-pill {
                display: inline-flex;
                align-items: center;
                gap: 0.3rem;
                padding: 0.28rem 0.55rem;
                border-radius: 999px;
                border: 1px solid rgba(114, 145, 174, 0.18);
                color: #a9bdcf;
                background: rgba(255, 255, 255, 0.02);
                font-size: 0.73rem;
            }

            .decision-signal {
                font-weight: 700;
                color: #f1f7fd;
                margin-bottom: 0.32rem;
            }

            .decision-summary {
                color: #8ea3b6;
                font-size: 0.88rem;
                line-height: 1.55;
                margin-bottom: 0.85rem;
            }

            .decision-stage-list {
                display: grid;
                gap: 0.7rem;
            }

            .decision-stage {
                display: grid;
                grid-template-columns: 108px minmax(0, 1fr);
                gap: 0.85rem;
                padding-top: 0.72rem;
                border-top: 1px solid rgba(114, 145, 174, 0.12);
            }

            .decision-stage:first-child {
                border-top: none;
                padding-top: 0;
            }

            .decision-stage-name {
                font-size: 0.76rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #7b91a8;
                padding-top: 0.1rem;
            }

            .decision-stage-body {
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
            }

            .decision-stage-top {
                display: flex;
                align-items: center;
                gap: 0.55rem;
                flex-wrap: wrap;
            }

            .stage-status {
                display: inline-flex;
                align-items: center;
                padding: 0.18rem 0.48rem;
                border-radius: 999px;
                font-size: 0.72rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                border: 1px solid transparent;
            }

            .stage-status-ok,
            .stage-status-planned {
                color: #82f3c2;
                background: rgba(41, 112, 82, 0.24);
                border-color: rgba(70, 175, 128, 0.3);
            }

            .stage-status-rejected,
            .stage-status-error {
                color: #ffb1ab;
                background: rgba(119, 43, 43, 0.24);
                border-color: rgba(197, 90, 90, 0.26);
            }

            .stage-status-skipped,
            .stage-status-noop {
                color: #9cb0c4;
                background: rgba(77, 92, 112, 0.2);
                border-color: rgba(114, 145, 174, 0.24);
            }

            .decision-stage-body p {
                margin: 0;
                color: #dde8f3;
                font-size: 0.9rem;
                line-height: 1.55;
            }

            .decision-stage-payload {
                margin: 0;
                padding: 0.7rem 0.8rem;
                border-radius: 12px;
                background: rgba(3, 8, 14, 0.48);
                color: #89a7c3;
                font-size: 0.76rem;
                line-height: 1.5;
                overflow: auto;
                max-height: 180px;
            }

            .decision-stack {
                display: grid;
                gap: 0.75rem;
            }

            .decision-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.8rem;
                flex-wrap: wrap;
                margin-bottom: 0.8rem;
            }

            .decision-toolbar .subtle-meta {
                color: #7c93a8;
                font-size: 0.8rem;
            }

            .decision-timeline {
                display: grid;
                gap: 0.6rem;
                max-height: 720px;
                overflow: auto;
                padding-right: 0.15rem;
            }

            .decision-item {
                width: 100%;
                border: 1px solid rgba(114, 145, 174, 0.15);
                background: rgba(8, 13, 22, 0.82);
                border-radius: 16px;
                padding: 0.78rem 0.82rem;
                text-align: left;
                transition: border-color 0.18s ease, background 0.18s ease;
            }

            .decision-item:hover,
            .decision-item.is-active {
                border-color: rgba(46, 211, 255, 0.35);
                background: rgba(11, 18, 30, 0.96);
            }

            .decision-item-top {
                display: flex;
                justify-content: space-between;
                gap: 0.8rem;
                align-items: flex-start;
                margin-bottom: 0.36rem;
            }

            .decision-item-symbol {
                color: #eef5ff;
                font-weight: 700;
                font-size: 0.9rem;
            }

            .decision-item-time {
                color: #7891a7;
                font-size: 0.74rem;
                white-space: nowrap;
            }

            .decision-item-signal {
                color: #a4d8ff;
                font-size: 0.78rem;
                margin-bottom: 0.28rem;
            }

            .decision-item-summary {
                color: #8ea5bb;
                font-size: 0.8rem;
                line-height: 1.45;
                margin-bottom: 0.55rem;
            }

            .decision-stage-strip {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
            }

            .decision-stage-chip {
                display: inline-flex;
                align-items: center;
                gap: 0.25rem;
                padding: 0.18rem 0.42rem;
                border-radius: 999px;
                font-size: 0.68rem;
                color: #9db5cb;
                background: rgba(67, 81, 98, 0.22);
            }

            .decision-empty {
                min-height: 220px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px dashed rgba(114, 145, 174, 0.18);
                border-radius: 18px;
                color: #7f96ab;
                background: rgba(8, 12, 20, 0.42);
                font-size: 0.88rem;
                text-align: center;
                padding: 1rem;
            }

            @media (max-width: 1200px) {
                .decision-grid {
                    grid-template-columns: 1fr;
                }

                .decision-focus {
                    min-height: auto;
                }
            }

            @media (max-width: 720px) {
                .decision-stage {
                    grid-template-columns: 1fr;
                    gap: 0.45rem;
                }

                .decision-stage-name {
                    padding-top: 0;
                }
            }
        }
    </style>

<script>
    const chartDom = document.getElementById('chart-container');
    const myChart = echarts.init(chartDom, null, { renderer: 'canvas', useDirtyRect: false });

    let currentData = null;
    let decisionDataset = [];
    let decisionSource = '-';
    let selectedDecisionTraceId = '';
    let socket = null;
    let lastSnapshotAtMs = 0;
    window.INIT_VARIANT = "{{ (variant or '')|e }}";
    const FRONT_POLL_MS = Number("{{ (front_poll_ms or 3000)|int }}");
    const FRONT_STALE_MS = Number("{{ (front_stale_ms or 5000)|int }}");

    const INDICATOR_COLORS = [
        '#91b6ff', '#d9ac58', '#74b982', '#de7766', '#8db2d6',
        '#7eb6b1', '#c4a77a', '#a1aac7', '#5c9d9f', '#d6c3a3'
    ];

    function setFreshnessState(isLive) {
        const liveStatus = document.getElementById('live-status');
        const liveLabel = liveStatus ? liveStatus.querySelector('.label') : null;
        if (!liveStatus || !liveLabel) return;
        document.body.classList.toggle('feed-live', !!isLive);
        liveStatus.classList.toggle('is-live', !!isLive);
        liveLabel.textContent = isLive ? 'LIVE' : 'WAIT';
    }

    function updateSnapshotLag() {
        const el = document.getElementById('snapshot-lag');
        if (!el) return;
        if (!lastSnapshotAtMs) {
            el.textContent = '等待数据';
            return;
        }
        const lagSec = Math.max(0, ((Date.now() - lastSnapshotAtMs) / 1000));
        el.textContent = lagSec < 1 ? '<1s' : lagSec.toFixed(1) + 's';
    }

    function buildChartOption(symbolData) {
        const dates = symbolData.dates || [];
        const ohlc = symbolData.ohlc || [];
        const indicators = symbolData.indicators || {};

        const subCharts = indicators.sub_charts || [];
        const overlays = indicators.overlays || [];
        const marks = indicators.marks || [];

        const subCount = subCharts.length;
        const mainHeight = subCount > 0 ? 56 : 82;
        const subHeight = subCount > 0 ? Math.floor(28 / subCount) : 0;
        const subGap = 5;

        const grids = [{ left: '5%', right: '4%', top: '5%', height: mainHeight + '%' }];
        const xAxes = [{
            type: 'category', data: dates, scale: true, boundaryGap: false,
            axisLine: { onZero: false, lineStyle: { color: 'rgba(146, 188, 220, 0.38)' } },
            axisLabel: { show: subCount === 0, color: '#89a1b5' },
            splitLine: { show: false }, min: 'dataMin', max: 'dataMax', gridIndex: 0
        }];
        const yAxes = [{
            scale: true,
            splitArea: { show: false },
            splitLine: { show: true, lineStyle: { color: 'rgba(121, 166, 200, 0.14)' } },
            axisLabel: { color: '#89a1b5' },
            gridIndex: 0
        }];

        let topOffset = 5 + mainHeight + subGap;
        subCharts.forEach((sub, i) => {
            grids.push({ left: '5%', right: '4%', top: topOffset + '%', height: subHeight + '%' });
            xAxes.push({
                type: 'category', data: dates, gridIndex: i + 1,
                axisLabel: { show: i === subCount - 1, color: '#89a1b5' },
                axisTick: { show: false },
                axisLine: { lineStyle: { color: 'rgba(146, 188, 220, 0.34)' } }
            });
            yAxes.push({
                scale: true,
                gridIndex: i + 1,
                splitNumber: 3,
                axisLabel: { color: '#7d93a5', fontSize: 10 },
                axisLine: { show: false },
                axisTick: { show: false },
                splitLine: { show: true, lineStyle: { color: 'rgba(121, 166, 200, 0.12)', type: 'dashed' } }
            });
            topOffset += subHeight + subGap;
        });

        const series = [{
            name: 'K线', type: 'candlestick', xAxisIndex: 0, yAxisIndex: 0, data: ohlc,
            itemStyle: {
                color: '#ff6a6a',
                color0: '#4ee38c',
                borderColor: '#ff6a6a',
                borderColor0: '#4ee38c'
            }
        }];

        let colorIdx = 0;
        overlays.forEach((ov) => {
            const c = INDICATOR_COLORS[colorIdx++ % INDICATOR_COLORS.length];
            series.push({
                name: ov.name || '',
                type: ov.type || 'line',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: ov.data || [],
                showSymbol: false,
                lineStyle: { width: 1.4, color: c },
                itemStyle: { color: c },
                emphasis: { focus: 'series' }
            });
        });

        if (marks.length > 0) {
            series.push({
                name: '标记',
                type: 'scatter',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: marks.map((m) => ({
                    value: [m.coord[0], m.coord[1]],
                    label: {
                        show: true,
                        position: m.position || 'top',
                        formatter: String(m.value || ''),
                        fontSize: 12,
                        fontWeight: 'bold',
                        color: '#eaf5ff'
                    },
                    itemStyle: { color: 'transparent' },
                    symbol: 'circle',
                    symbolSize: 1
                })),
                symbolSize: 1,
                z: 12
            });
        }

        subCharts.forEach((sub, i) => {
            (sub.series || []).forEach((s) => {
                const c = INDICATOR_COLORS[colorIdx++ % INDICATOR_COLORS.length];
                const item = {
                    name: s.name || '',
                    type: s.type || 'line',
                    xAxisIndex: i + 1,
                    yAxisIndex: i + 1,
                    data: s.data || [],
                    showSymbol: false,
                    lineStyle: { width: 1.2, color: c },
                    itemStyle: { color: c }
                };
                if (s.type === 'bar') {
                    item.itemStyle = {
                        color: function (params) {
                            return params.value > 0 ? '#ff7575' : '#4ee38c';
                        }
                    };
                }
                series.push(item);
            });
        });

        const xAxisIndices = xAxes.map((_, i) => i);

        return {
            animationDuration: 260,
            animationEasing: 'cubicOut',
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'cross',
                    label: { backgroundColor: 'rgba(43, 55, 72, 0.92)' }
                },
                backgroundColor: 'rgba(18, 23, 32, 0.96)',
                borderColor: 'rgba(112, 124, 141, 0.45)',
                borderWidth: 1,
                padding: 10,
                textStyle: { color: '#eef3f8' }
            },
            axisPointer: {
                link: [{ xAxisIndex: 'all' }],
                label: { backgroundColor: '#3d4c62' }
            },
            toolbox: {
                feature: { dataZoom: { yAxisIndex: 'none' }, restore: {}, saveAsImage: {} },
                iconStyle: { borderColor: '#7f8ea3' },
                right: 8
            },
            grid: grids,
            xAxis: xAxes,
            yAxis: yAxes,
            series: series,
            dataZoom: [
                { type: 'inside', xAxisIndex: xAxisIndices, start: 80, end: 100 },
                {
                    show: true,
                    type: 'slider',
                    xAxisIndex: xAxisIndices,
                    top: '93%',
                    height: '5%',
                    start: 80,
                    end: 100,
                    borderColor: 'rgba(112, 124, 141, 0.42)',
                    fillerColor: 'rgba(145, 182, 255, 0.18)',
                    textStyle: { color: '#8a98ac' },
                    handleStyle: { color: '#91b6ff' },
                    moveHandleStyle: { color: '#91b6ff' },
                    emphasis: { moveHandleStyle: { color: '#aac7ff' } }
                }
            ]
        };
    }

    function applySnapshot(rawData) {
        if (!rawData || !rawData.instruments) return;
        currentData = rawData;
        lastSnapshotAtMs = Date.now();

        document.getElementById('update-time').textContent = '最后更新: ' + (rawData.timestamp || '-');
        document.getElementById('variant-name').textContent = rawData.variant || '-';
        document.getElementById('stat-symbol-count').textContent = Object.keys(rawData.instruments || {}).length;
        document.getElementById('stat-order-count').textContent = (rawData.orders || []).length;
        document.getElementById('stat-position-count').textContent = (rawData.positions || []).length;

        updateMonthSelect(rawData.instruments);
        updateSymbolSelect();
        updateChartFromCache();
        renderOrders(rawData.orders);
        renderPositions(rawData.positions);
        mergeSnapshotDecisions(rawData.recent_decisions || []);
        setFreshnessState(true);
        updateSnapshotLag();
    }

    function normalizeDecisionEntry(entry, sourceOverride) {
        const isEventWrapper = entry && entry.payload && Array.isArray(entry.payload.stages);
        const raw = isEventWrapper ? entry.payload : entry;
        if (!raw || !Array.isArray(raw.stages)) return null;

        const barDt = raw.bar_dt || raw.barDt || entry.bar_dt || entry.created_at || '';
        const stages = raw.stages.map((stage) => ({
            stage: stage.stage || '-',
            status: stage.status || 'noop',
            summary: stage.summary || '',
            payload: stage.payload || {}
        }));
        const effectiveStage = stages.find((stage) => !['noop', 'skipped'].includes(String(stage.status || '').toLowerCase()));

        return {
            trace_id: raw.trace_id || entry.trace_id || ('trace-' + Math.random().toString(16).slice(2)),
            vt_symbol: raw.vt_symbol || entry.vt_symbol || '-',
            signal_name: raw.signal_name || '-',
            trace_type: raw.trace_type || 'decision_trace',
            bar_dt: barDt,
            created_at: entry.created_at || barDt,
            metadata: raw.metadata || {},
            stages: stages,
            source: sourceOverride || (isEventWrapper ? 'events' : 'snapshot'),
            headline: effectiveStage ? effectiveStage.summary : (stages[0] ? stages[0].summary : '无可用阶段摘要')
        };
    }

    function normalizeDecisionEntries(items, sourceLabel) {
        return (items || [])
            .map((item) => normalizeDecisionEntry(item, sourceLabel))
            .filter(Boolean);
    }

    function mergeSnapshotDecisions(items) {
        const normalized = normalizeDecisionEntries(items, 'snapshot');
        if (!normalized.length) {
            renderDecisionPanel();
            return;
        }
        const existingIds = new Set(decisionDataset.map((item) => item.trace_id));
        normalized.forEach((item) => {
            if (!existingIds.has(item.trace_id)) {
                decisionDataset.push(item);
            }
        });
        sortDecisionDataset();
        renderDecisionPanel();
    }

    function sortDecisionDataset() {
        decisionDataset.sort(function (a, b) {
            return new Date(b.created_at || b.bar_dt || 0) - new Date(a.created_at || a.bar_dt || 0);
        });
    }

    function getDecisionStatusClass(status) {
        const key = String(status || 'noop').toLowerCase();
        if (key === 'ok' || key === 'planned') return 'stage-status-ok';
        if (key === 'rejected' || key === 'error') return 'stage-status-rejected';
        return 'stage-status-skipped';
    }

    function getDecisionSummary(trace) {
        if (!trace || !trace.stages || trace.stages.length === 0) return '暂无阶段信息';
        const effective = trace.stages.find((stage) => !['noop', 'skipped'].includes(String(stage.status || '').toLowerCase()));
        return effective ? effective.summary : (trace.stages[0].summary || '暂无阶段信息');
    }

    function getFilteredDecisions() {
        const symbol = document.getElementById('symbol-select').value;
        if (!symbol) return decisionDataset;
        return decisionDataset.filter((item) => item.vt_symbol === symbol || (item.metadata && item.metadata.underlying_vt_symbol === symbol));
    }

    function renderDecisionPanel() {
        const items = getFilteredDecisions();
        document.getElementById('decision-count').textContent = items.length;
        document.getElementById('decision-source').textContent = decisionSource;

        const timeline = document.getElementById('decision-timeline');
        if (!items.length) {
            timeline.innerHTML = '<div class="decision-empty">当前筛选条件下暂无决策轨迹。</div>';
            renderDecisionFocus(null);
            return;
        }

        if (!selectedDecisionTraceId || !items.some((item) => item.trace_id === selectedDecisionTraceId)) {
            selectedDecisionTraceId = items[0].trace_id;
        }

        timeline.innerHTML = '';
        items.forEach((item) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'decision-item' + (item.trace_id === selectedDecisionTraceId ? ' is-active' : '');
            button.onclick = function () {
                selectedDecisionTraceId = item.trace_id;
                renderDecisionPanel();
            };

            const stageChips = item.stages.slice(0, 6).map((stage) => {
                return '<span class="decision-stage-chip">' + stage.stage + ' · ' + stage.status + '</span>';
            }).join('');

            button.innerHTML =
                '<div class="decision-item-top">' +
                    '<div>' +
                        '<div class="decision-item-symbol">' + item.vt_symbol + '</div>' +
                        '<div class="decision-item-signal">' + (item.signal_name || item.trace_type || '-') + '</div>' +
                    '</div>' +
                    '<div class="decision-item-time">' + (item.bar_dt || item.created_at || '-') + '</div>' +
                '</div>' +
                '<div class="decision-item-summary">' + getDecisionSummary(item) + '</div>' +
                '<div class="decision-stage-strip">' + stageChips + '</div>';
            timeline.appendChild(button);
        });

        renderDecisionFocus(items.find((item) => item.trace_id === selectedDecisionTraceId) || items[0]);
    }

    function renderDecisionFocus(item) {
        const emptyEl = document.getElementById('decision-focus-empty');
        const contentEl = document.getElementById('decision-focus-content');
        if (!item) {
            emptyEl.style.display = 'flex';
            contentEl.style.display = 'none';
            return;
        }

        emptyEl.style.display = 'none';
        contentEl.style.display = 'block';
        document.getElementById('decision-focus-symbol').textContent = item.vt_symbol || '-';
        document.getElementById('decision-focus-signal').textContent = item.signal_name || item.trace_type || '-';
        document.getElementById('decision-focus-type').textContent = item.trace_type || '-';
        document.getElementById('decision-focus-time').textContent = item.bar_dt || item.created_at || '-';
        document.getElementById('decision-focus-summary').textContent = getDecisionSummary(item);

        const stageList = document.getElementById('decision-stage-list');
        stageList.innerHTML = '';
        item.stages.forEach((stage) => {
            const stageEl = document.createElement('div');
            stageEl.className = 'decision-stage';
            stageEl.innerHTML =
                '<div class="decision-stage-name">' + stage.stage + '</div>' +
                '<div class="decision-stage-body">' +
                    '<div class="decision-stage-top">' +
                        '<span class="stage-status ' + getDecisionStatusClass(stage.status) + '">' + stage.status + '</span>' +
                    '</div>' +
                    '<p>' + (stage.summary || '-') + '</p>' +
                    '<pre class="decision-stage-payload">' + escapeHtml(JSON.stringify(stage.payload || {}, null, 2)) + '</pre>' +
                '</div>';
            stageList.appendChild(stageEl);
        });
    }

    function escapeHtml(text) {
        return String(text || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
    }

    async function fetchDecisionData() {
        const sel = document.getElementById('strategy-select');
        if (!sel.value) return;
        const symbol = document.getElementById('symbol-select').value;

        try {
            const resp = await axios.get('/api/decisions/' + sel.value, {
                params: {
                    vt_symbol: symbol || '',
                    limit: 120
                }
            });
            const payload = resp.data || {};
            decisionSource = payload.source || '-';
            decisionDataset = normalizeDecisionEntries(payload.items || [], decisionSource);
            sortDecisionDataset();
            mergeSnapshotDecisions((currentData && currentData.recent_decisions) || []);
            renderDecisionPanel();
        } catch (e) {
            decisionSource = 'snapshot';
            decisionDataset = normalizeDecisionEntries((currentData && currentData.recent_decisions) || [], 'snapshot');
            sortDecisionDataset();
            renderDecisionPanel();
        }
    }

    function subscribeCurrentVariant() {
        if (!socket || !socket.connected) return;
        const sel = document.getElementById('strategy-select');
        const variant = sel.value;
        if (!variant) return;
        try {
            socket.emit('subscribe', { variant: variant });
        } catch (e) {}
    }

    function initSocket() {
        if (typeof io === 'undefined') return;
        try {
            socket = io();
        } catch (e) {
            socket = null;
            return;
        }

        socket.on('connect', function () {
            subscribeCurrentVariant();
            setFreshnessState(true);
        });

        socket.on('disconnect', function () {
            setFreshnessState(false);
        });

        socket.on('snapshot_update', function (data) {
            const sel = document.getElementById('strategy-select');
            if (data && data.variant === sel.value) applySnapshot(data);
        });

        socket.on('event_new', function (event) {
            const sel = document.getElementById('strategy-select');
            if (!event || event.variant !== sel.value || event.event_type !== 'decision_trace') return;
            const normalized = normalizeDecisionEntry(event, 'events');
            if (!normalized) return;
            decisionSource = 'events';
            decisionDataset = [normalized].concat(decisionDataset.filter((item) => item.trace_id !== normalized.trace_id));
            sortDecisionDataset();
            renderDecisionPanel();
        });
    }

    async function loadStrategies() {
        try {
            const resp = await axios.get('/api/strategies');
            const strategies = resp.data || [];
            const sel = document.getElementById('strategy-select');
            sel.innerHTML = '';

            if (strategies.length === 0) {
                sel.innerHTML = '<option value="">未找到数据</option>';
                return;
            }

            strategies.forEach((s) => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.text = s;
                sel.add(opt);
            });

            if (window.INIT_VARIANT && strategies.includes(window.INIT_VARIANT)) {
                sel.value = window.INIT_VARIANT;
            }

            fetchData();
            sel.addEventListener('change', function () {
                document.getElementById('month-select').innerHTML = '<option value="all">所有月份</option>';
                document.getElementById('symbol-select').innerHTML = '<option value="">所有标的</option>';
                currentData = null;
                decisionDataset = [];
                selectedDecisionTraceId = '';
                fetchData();
            });

            document.getElementById('month-select').addEventListener('change', function () {
                updateSymbolSelect();
                updateChartFromCache();
                renderDecisionPanel();
            });

            document.getElementById('symbol-select').addEventListener('change', function () {
                updateChartFromCache();
                renderDecisionPanel();
            });
        } catch (e) {
            document.getElementById('strategy-select').innerHTML = '<option value="">加载失败</option>';
        }
    }

    async function fetchData() {
        const sel = document.getElementById('strategy-select');
        if (!sel.value) return;

        try {
            const resp = await axios.get('/api/data/' + sel.value);
            applySnapshot(resp.data);
            fetchDecisionData();
            subscribeCurrentVariant();
        } catch (e) {
            setFreshnessState(false);
            console.error('获取数据错误:', e);
        }
    }

    function updateMonthSelect(instruments) {
        const monthSelect = document.getElementById('month-select');
        const current = monthSelect.value;

        const months = new Set();
        Object.values(instruments).forEach((inst) => {
            if (inst.delivery_month) months.add(inst.delivery_month);
        });

        const sorted = Array.from(months).sort();
        const previous = Array.from(monthSelect.options).map((o) => o.value).filter((v) => v !== 'all');
        if (JSON.stringify(previous) === JSON.stringify(sorted)) return;

        monthSelect.innerHTML = '<option value="all">所有月份</option>';
        sorted.forEach((m) => {
            const option = document.createElement('option');
            option.value = m;
            option.text = m;
            monthSelect.add(option);
        });

        if (sorted.includes(current)) monthSelect.value = current;
    }

    function updateSymbolSelect() {
        if (!currentData || !currentData.instruments) return;

        const monthFilter = document.getElementById('month-select').value;
        const symbolSelect = document.getElementById('symbol-select');
        const current = symbolSelect.value;

        const filtered = Object.keys(currentData.instruments).filter((sym) => {
            return monthFilter === 'all' || currentData.instruments[sym].delivery_month === monthFilter;
        }).sort();

        const previous = Array.from(symbolSelect.options).map((o) => o.value);
        if (JSON.stringify(previous) === JSON.stringify(filtered)) return;

        symbolSelect.innerHTML = '';
        if (filtered.length === 0) {
            symbolSelect.innerHTML = '<option value="">无匹配标的</option>';
            return;
        }

        filtered.forEach((sym) => {
            const option = document.createElement('option');
            option.value = sym;
            option.text = sym;
            symbolSelect.add(option);
        });

        symbolSelect.value = filtered.includes(current) ? current : filtered[0];
    }

    function updateChartFromCache() {
        if (!currentData || !currentData.instruments) return;

        const symbol = document.getElementById('symbol-select').value;
        if (!symbol || !currentData.instruments[symbol]) {
            myChart.clear();
            return;
        }

        myChart.clear();
        myChart.setOption(buildChartOption(currentData.instruments[symbol]), true);
    }

    function normalizeDirection(direction) {
        if (direction === 'Long') return '多';
        if (direction === 'Short') return '空';
        return direction || '-';
    }

    function normalizeOffset(offset) {
        if (offset === 'Open') return '开';
        if (offset === 'Close') return '平';
        if (offset === 'CloseToday') return '平今';
        return offset || '-';
    }

    function getStatusClass(status) {
        const text = String(status || '').toLowerCase();
        if (!text) return 'status-live';
        if (text.includes('alltraded') || text.includes('filled') || text.includes('成交')) return 'status-filled';
        if (text.includes('cancel') || text.includes('撤单')) return 'status-cancel';
        if (text.includes('reject') || text.includes('fail') || text.includes('error') || text.includes('拒绝')) return 'status-reject';
        return 'status-live';
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('order-list');
        if (!orders || orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-row">无活动订单</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        orders.forEach((o) => {
            const tr = document.createElement('tr');
            const directionClass = (o.direction || '').includes('Short') ? 'text-danger' : 'text-success';
            const directionText = normalizeDirection(o.direction);
            const offsetText = normalizeOffset(o.offset);
            const orderId = o.vt_orderid || '';
            const displayOrderId = orderId.includes('.') ? orderId.split('.')[0] : orderId;
            const statusClass = getStatusClass(o.status);

            tr.innerHTML =
                '<td title="' + orderId + '">' + displayOrderId + '</td>' +
                '<td class="row-direction ' + directionClass + '">' + directionText + '/' + offsetText + '</td>' +
                '<td>' + (o.price ?? '-') + '</td>' +
                '<td>' + (o.volume ?? '-') + '</td>' +
                '<td><span class="status-tag ' + statusClass + '">' + (o.status || '-') + '</span></td>';

            tbody.appendChild(tr);
        });
    }

    function renderPositions(positions) {
        const tbody = document.getElementById('position-list');
        if (!positions || positions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-row">无持仓</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        positions.forEach((p) => {
            const tr = document.createElement('tr');
            const pnl = Number(p.pnl || 0);
            const pnlClass = pnl >= 0 ? 'text-success' : 'text-danger';

            tr.innerHTML =
                '<td title="' + (p.vt_symbol || '') + '">' + (p.vt_symbol || '-') + '</td>' +
                '<td class="row-direction">' + normalizeDirection(p.direction) + '</td>' +
                '<td>' + (p.volume ?? 0) + '</td>' +
                '<td class="' + pnlClass + '">' + pnl.toFixed(2) + '</td>';
            tbody.appendChild(tr);
        });
    }

    window.addEventListener('resize', function () {
        myChart.resize();
    });

    const pollLabel = document.getElementById('poll-interval');
    if (pollLabel) pollLabel.textContent = (Math.round(FRONT_POLL_MS / 100) / 10) + 's';

    const autoLabel = document.getElementById('auto-refresh-label');
    if (autoLabel) autoLabel.textContent = '自动刷新 (' + (Math.round(FRONT_POLL_MS / 100) / 10) + 's)';

    setFreshnessState(false);
    loadStrategies();
    initSocket();

    setInterval(function () {
        const autoRefresh = document.getElementById('auto-refresh');
        if (!autoRefresh || !autoRefresh.checked) return;

        const stale = !lastSnapshotAtMs || (Date.now() - lastSnapshotAtMs > FRONT_STALE_MS);
        if (!socket || !socket.connected || stale) fetchData();

        setFreshnessState(!stale);
        updateSnapshotLag();
    }, FRONT_POLL_MS);
</script>
</body>
</html>
