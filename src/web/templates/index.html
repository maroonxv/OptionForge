<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>期权策略驾驶舱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-0: #050b12;
            --bg-1: #0d1724;
            --panel-bg: rgba(16, 28, 41, 0.84);
            --panel-strong: rgba(21, 36, 52, 0.96);
            --panel-frost: rgba(22, 36, 52, 0.55);
            --border-soft: rgba(130, 184, 227, 0.18);
            --border-strong: rgba(130, 184, 227, 0.32);
            --text-primary: #e6f3ff;
            --text-secondary: #97aec2;
            --text-dim: #71889b;
            --accent-cyan: #2ed3ff;
            --accent-amber: #ffc96a;
            --accent-green: #4ee38c;
            --accent-red: #ff7575;
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --shadow-main: 0 26px 54px rgba(1, 8, 16, 0.58);
            --shadow-soft: 0 12px 30px rgba(2, 10, 20, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-primary);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(1100px circle at 88% -8%, rgba(46, 211, 255, 0.22), transparent 58%),
                radial-gradient(780px circle at -8% 24%, rgba(255, 201, 106, 0.15), transparent 54%),
                linear-gradient(138deg, var(--bg-0), var(--bg-1));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            opacity: 0.25;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 1), transparent 85%);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.08;
            background: repeating-linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.12) 0,
                rgba(255, 255, 255, 0.12) 1px,
                transparent 1px,
                transparent 4px
            );
        }

        .dashboard-shell {
            max-width: 1880px;
        }

        .animate-rise {
            opacity: 0;
            transform: translateY(16px) scale(0.99);
            animation: rise-in 0.65s cubic-bezier(.18, .75, .28, 1) forwards;
        }

        .delay-1 { animation-delay: 0.06s; }
        .delay-2 { animation-delay: 0.14s; }
        .delay-3 { animation-delay: 0.22s; }
        .delay-4 { animation-delay: 0.30s; }

        @keyframes rise-in {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hero-panel,
        .surface-card {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-xl);
            background: linear-gradient(155deg, rgba(21, 35, 49, 0.93), rgba(14, 24, 36, 0.9));
            box-shadow: var(--shadow-main);
            position: relative;
            overflow: hidden;
        }

        .hero-panel::before,
        .surface-card::before {
            content: "";
            position: absolute;
            inset: -1px;
            pointer-events: none;
            border-radius: inherit;
            background: linear-gradient(125deg, rgba(46, 211, 255, 0.25), transparent 30%, transparent 70%, rgba(255, 201, 106, 0.2));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            padding: 1px;
            opacity: 0.65;
        }

        .hero-panel {
            padding: 1.35rem;
            display: flex;
            gap: 1.35rem;
            justify-content: space-between;
            align-items: stretch;
            flex-wrap: wrap;
            margin-bottom: 1.1rem;
        }

        .hero-main {
            flex: 1 1 420px;
            min-width: 320px;
        }

        .eyebrow {
            margin: 0 0 0.6rem;
            color: var(--accent-cyan);
            letter-spacing: 0.16em;
            font-size: 0.68rem;
            font-family: "IBM Plex Mono", monospace;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: "Noto Serif SC", serif;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: clamp(1.65rem, 1.25rem + 1vw, 2.25rem);
        }

        .hero-meta {
            margin-top: 0.95rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3rem 0.65rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 117, 117, 0.4);
            background: rgba(255, 117, 117, 0.14);
            color: #ffb8b8;
            transition: all 0.3s ease;
        }

        .live-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
        }

        .live-indicator.is-live {
            border-color: rgba(78, 227, 140, 0.4);
            background: rgba(78, 227, 140, 0.13);
            color: #8df6b7;
        }

        .update-time {
            color: var(--text-secondary);
            font-size: 0.83rem;
            letter-spacing: 0.02em;
        }

        .hero-controls {
            flex: 1 1 500px;
            min-width: 320px;
            border: 1px solid rgba(143, 182, 212, 0.18);
            border-radius: var(--radius-lg);
            background: var(--panel-frost);
            backdrop-filter: blur(10px);
            display: grid;
            gap: 0.9rem;
            padding: 0.95rem 1rem;
            align-content: start;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(120px, 1fr));
            gap: 0.75rem;
        }

        .control-field {
            display: grid;
            gap: 0.28rem;
        }

        .control-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-family: "IBM Plex Mono", monospace;
        }

        .form-select {
            border: 1px solid rgba(131, 177, 209, 0.26);
            background-color: rgba(8, 16, 26, 0.9);
            color: var(--text-primary);
            border-radius: 11px;
            padding-top: 0.42rem;
            padding-bottom: 0.42rem;
            font-size: 0.87rem;
        }

        .form-select:focus {
            border-color: rgba(46, 211, 255, 0.75);
            box-shadow: 0 0 0 0.16rem rgba(46, 211, 255, 0.2);
            background-color: rgba(10, 20, 32, 0.95);
            color: var(--text-primary);
        }

        .control-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.85rem;
            flex-wrap: wrap;
            border-top: 1px solid rgba(131, 177, 209, 0.18);
            padding-top: 0.7rem;
        }

        .btn-refresh {
            border: 1px solid rgba(46, 211, 255, 0.45);
            color: #cbf6ff;
            background: linear-gradient(138deg, rgba(46, 211, 255, 0.28), rgba(46, 211, 255, 0.1));
            border-radius: 10px;
            font-size: 0.84rem;
            letter-spacing: 0.03em;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 0.4rem 0.9rem;
        }

        .btn-refresh:hover {
            color: #ecfbff;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(46, 211, 255, 0.22);
        }

        .switch-row {
            display: inline-flex;
            gap: 0.58rem;
            align-items: center;
        }

        #auto-refresh-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .form-check-input {
            width: 2.35em;
            height: 1.2em;
            border: 1px solid rgba(129, 168, 198, 0.45);
            background-color: rgba(86, 109, 128, 0.5);
            cursor: pointer;
            margin-top: 0;
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 0.16rem rgba(46, 211, 255, 0.2);
            border-color: rgba(46, 211, 255, 0.68);
        }

        .form-check-input:checked {
            border-color: rgba(78, 227, 140, 0.75);
            background-color: var(--accent-green);
        }

        .surface-card {
            border-radius: var(--radius-xl);
            margin-bottom: 1rem;
        }

        .surface-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.05rem 1.15rem 0.95rem;
            border-bottom: 1px solid rgba(131, 177, 209, 0.17);
        }

        .surface-head h2,
        .surface-head h3 {
            margin: 0;
            font-size: 1.04rem;
            font-family: "Noto Serif SC", serif;
            letter-spacing: 0.02em;
        }

        .metric-cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .metric-chip {
            min-width: 78px;
            padding: 0.46rem 0.68rem;
            border-radius: 12px;
            border: 1px solid rgba(127, 166, 197, 0.22);
            background: rgba(9, 18, 30, 0.7);
            display: grid;
            gap: 0.12rem;
            text-align: center;
        }

        .metric-chip span {
            color: var(--text-dim);
            font-size: 0.68rem;
            letter-spacing: 0.03em;
        }

        .metric-chip strong {
            color: var(--text-primary);
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.95rem;
            line-height: 1;
        }

        .chart-shell {
            padding: 0.75rem 0.85rem 0.7rem;
            position: relative;
        }

        .chart-shell::after {
            content: "";
            position: absolute;
            inset: 0.75rem 0.85rem 0.7rem;
            pointer-events: none;
            border-radius: 16px;
            border: 1px solid rgba(130, 184, 227, 0.12);
            background: linear-gradient(180deg, rgba(13, 22, 34, 0.28), rgba(11, 19, 30, 0.05));
        }

        #chart-container {
            width: 100%;
            height: min(72vh, 770px);
            min-height: 430px;
        }

        .side-stack .surface-card {
            border-radius: var(--radius-lg);
            background: linear-gradient(156deg, rgba(19, 33, 46, 0.95), rgba(11, 21, 31, 0.9));
            box-shadow: var(--shadow-soft);
        }

        .table-wrap {
            max-height: 360px;
            overflow-y: auto;
        }

        .table {
            margin: 0;
            color: var(--text-primary);
            border-color: rgba(127, 166, 197, 0.2);
            font-size: 0.84rem;
        }

        .table thead th {
            font-size: 0.71rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            background: rgba(14, 24, 37, 0.96);
            border-bottom-color: rgba(127, 166, 197, 0.22);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .table td,
        .table th {
            padding: 0.56rem 0.62rem;
            vertical-align: middle;
            border-color: rgba(127, 166, 197, 0.14);
            white-space: nowrap;
        }

        .table tbody tr:nth-of-type(odd) {
            background: rgba(7, 16, 27, 0.34);
        }

        .table tbody tr:hover {
            background: rgba(46, 211, 255, 0.08);
        }

        .status-tag {
            border-radius: 999px;
            border: 1px solid transparent;
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.66rem;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.5rem;
        }

        .status-live {
            color: #7fd7ff;
            background: rgba(46, 211, 255, 0.15);
            border-color: rgba(46, 211, 255, 0.36);
        }

        .status-filled {
            color: #9cf8bd;
            background: rgba(78, 227, 140, 0.16);
            border-color: rgba(78, 227, 140, 0.35);
        }

        .status-cancel {
            color: #ffe3b0;
            background: rgba(255, 201, 106, 0.18);
            border-color: rgba(255, 201, 106, 0.34);
        }

        .status-reject {
            color: #ffb2b2;
            background: rgba(255, 117, 117, 0.16);
            border-color: rgba(255, 117, 117, 0.35);
        }

        .text-success {
            color: var(--accent-green) !important;
        }

        .text-danger {
            color: var(--accent-red) !important;
        }

        .text-muted {
            color: var(--text-secondary) !important;
        }

        .sys-grid {
            display: grid;
            gap: 0.68rem;
        }

        .sys-item {
            border: 1px solid rgba(127, 166, 197, 0.2);
            border-radius: 12px;
            background: rgba(8, 16, 27, 0.58);
            padding: 0.58rem 0.65rem;
            display: grid;
            gap: 0.2rem;
        }

        .sys-item span {
            color: var(--text-secondary);
            font-size: 0.73rem;
            letter-spacing: 0.03em;
        }

        code {
            color: var(--accent-amber);
            background: rgba(255, 201, 106, 0.12);
            border: 1px solid rgba(255, 201, 106, 0.22);
            padding: 0.24rem 0.45rem;
            border-radius: 8px;
            font-size: 0.73rem;
            font-family: "IBM Plex Mono", monospace;
            word-break: break-all;
        }

        .empty-row {
            color: var(--text-secondary);
            text-align: center;
            padding: 0.75rem 0.4rem;
        }

        .row-direction {
            font-family: "IBM Plex Mono", monospace;
            font-size: 0.73rem;
            letter-spacing: 0.02em;
        }

        .table-wrap::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrap::-webkit-scrollbar-track {
            background: rgba(6, 14, 23, 0.5);
        }

        .table-wrap::-webkit-scrollbar-thumb {
            background: rgba(130, 184, 227, 0.32);
            border-radius: 999px;
        }

        @media (max-width: 1199.98px) {
            .hero-panel {
                padding: 1.1rem;
            }

            #chart-container {
                height: min(62vh, 620px);
                min-height: 380px;
            }

            .table-wrap {
                max-height: 300px;
            }
        }

        @media (max-width: 991.98px) {
            .control-grid {
                grid-template-columns: 1fr;
            }

            .surface-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .metric-cluster {
                width: 100%;
            }

            .metric-chip {
                flex: 1 1 calc(33.33% - 0.5rem);
            }
        }

        @media (max-width: 767.98px) {
            .dashboard-shell {
                padding-left: 0.55rem;
                padding-right: 0.55rem;
            }

            .hero-panel {
                margin-bottom: 0.85rem;
            }

            .surface-head,
            .chart-shell {
                padding-left: 0.72rem;
                padding-right: 0.72rem;
            }

            #chart-container {
                min-height: 325px;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid dashboard-shell py-3 py-lg-4">
    <header class="hero-panel animate-rise delay-1">
        <div class="hero-main">
            <p class="eyebrow">Option Strategy Control Room</p>
            <h1>期权策略驾驶舱</h1>
            <div class="hero-meta">
                <span id="live-status" class="live-indicator">
                    <span class="dot"></span>
                    <span class="label">WAIT</span>
                </span>
                <small class="update-time" id="update-time">最后更新: -</small>
            </div>
        </div>

        <div class="hero-controls">
            <div class="control-grid">
                <div class="control-field">
                    <label class="control-label" for="strategy-select">实例</label>
                    <select id="strategy-select" class="form-select form-select-sm">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="control-field">
                    <label class="control-label" for="month-select">月份</label>
                    <select id="month-select" class="form-select form-select-sm">
                        <option value="all">所有月份</option>
                    </select>
                </div>
                <div class="control-field">
                    <label class="control-label" for="symbol-select">标的</label>
                    <select id="symbol-select" class="form-select form-select-sm">
                        <option value="">所有标的</option>
                    </select>
                </div>
            </div>

            <div class="control-actions">
                <button class="btn btn-refresh btn-sm" onclick="fetchData()">立即刷新</button>
                <div class="switch-row">
                    <label id="auto-refresh-label" for="auto-refresh">自动刷新</label>
                    <input class="form-check-input" type="checkbox" id="auto-refresh" checked>
                </div>
            </div>
        </div>
    </header>

    <div class="row g-3 g-xl-4">
        <div class="col-xl-9">
            <section class="surface-card animate-rise delay-2">
                <div class="surface-head">
                    <h2>市场概览</h2>
                    <div class="metric-cluster">
                        <div class="metric-chip"><span>标的</span><strong id="stat-symbol-count">0</strong></div>
                        <div class="metric-chip"><span>订单</span><strong id="stat-order-count">0</strong></div>
                        <div class="metric-chip"><span>持仓</span><strong id="stat-position-count">0</strong></div>
                    </div>
                </div>
                <div class="chart-shell">
                    <div id="chart-container"></div>
                </div>
            </section>
        </div>

        <div class="col-xl-3">
            <div class="side-stack">
                <section class="surface-card animate-rise delay-3">
                    <div class="surface-head">
                        <h3>活动订单</h3>
                    </div>
                    <div class="table-wrap">
                        <table class="table table-hover order-table">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>方向</th>
                                <th>价格</th>
                                <th>数量</th>
                                <th>状态</th>
                            </tr>
                            </thead>
                            <tbody id="order-list"></tbody>
                        </table>
                    </div>
                </section>

                <section class="surface-card animate-rise delay-4">
                    <div class="surface-head">
                        <h3>持仓</h3>
                    </div>
                    <div class="table-wrap">
                        <table class="table table-hover order-table">
                            <thead>
                            <tr>
                                <th>标的</th>
                                <th>方向</th>
                                <th>数量</th>
                                <th>盈亏</th>
                            </tr>
                            </thead>
                            <tbody id="position-list"></tbody>
                        </table>
                    </div>
                </section>

                <section class="surface-card animate-rise delay-4">
                    <div class="surface-head">
                        <h3>系统信息</h3>
                    </div>
                    <div class="card-body pt-0 pb-3 px-3">
                        <div class="sys-grid">
                            <div class="sys-item">
                                <span>当前实例</span>
                                <code id="variant-name">-</code>
                            </div>
                            <div class="sys-item">
                                <span>轮询周期</span>
                                <code id="poll-interval">-</code>
                            </div>
                            <div class="sys-item">
                                <span>快照状态</span>
                                <code id="snapshot-lag">等待数据</code>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>

<script>
    const chartDom = document.getElementById('chart-container');
    const myChart = echarts.init(chartDom, null, { renderer: 'canvas', useDirtyRect: false });

    let currentData = null;
    let socket = null;
    let lastSnapshotAtMs = 0;
    window.INIT_VARIANT = "{{ (variant or '')|e }}";
    const FRONT_POLL_MS = Number("{{ (front_poll_ms or 3000)|int }}");
    const FRONT_STALE_MS = Number("{{ (front_stale_ms or 5000)|int }}");

    const INDICATOR_COLORS = [
        '#2ed3ff', '#ffc96a', '#4ee38c', '#ff7575', '#7da5ff',
        '#83f0de', '#f7f08a', '#ffa29f', '#66d6ff', '#a9a1ff'
    ];

    function setFreshnessState(isLive) {
        const liveStatus = document.getElementById('live-status');
        const liveLabel = liveStatus ? liveStatus.querySelector('.label') : null;
        if (!liveStatus || !liveLabel) return;
        liveStatus.classList.toggle('is-live', !!isLive);
        liveLabel.textContent = isLive ? 'LIVE' : 'WAIT';
    }

    function updateSnapshotLag() {
        const el = document.getElementById('snapshot-lag');
        if (!el) return;
        if (!lastSnapshotAtMs) {
            el.textContent = '等待数据';
            return;
        }
        const lagSec = Math.max(0, ((Date.now() - lastSnapshotAtMs) / 1000));
        el.textContent = lagSec < 1 ? '<1s' : lagSec.toFixed(1) + 's';
    }

    function buildChartOption(symbolData) {
        const dates = symbolData.dates || [];
        const ohlc = symbolData.ohlc || [];
        const indicators = symbolData.indicators || {};

        const subCharts = indicators.sub_charts || [];
        const overlays = indicators.overlays || [];
        const marks = indicators.marks || [];

        const subCount = subCharts.length;
        const mainHeight = subCount > 0 ? 56 : 82;
        const subHeight = subCount > 0 ? Math.floor(28 / subCount) : 0;
        const subGap = 5;

        const grids = [{ left: '5%', right: '4%', top: '5%', height: mainHeight + '%' }];
        const xAxes = [{
            type: 'category', data: dates, scale: true, boundaryGap: false,
            axisLine: { onZero: false, lineStyle: { color: 'rgba(146, 188, 220, 0.38)' } },
            axisLabel: { show: subCount === 0, color: '#89a1b5' },
            splitLine: { show: false }, min: 'dataMin', max: 'dataMax', gridIndex: 0
        }];
        const yAxes = [{
            scale: true,
            splitArea: { show: false },
            splitLine: { show: true, lineStyle: { color: 'rgba(121, 166, 200, 0.14)' } },
            axisLabel: { color: '#89a1b5' },
            gridIndex: 0
        }];

        let topOffset = 5 + mainHeight + subGap;
        subCharts.forEach((sub, i) => {
            grids.push({ left: '5%', right: '4%', top: topOffset + '%', height: subHeight + '%' });
            xAxes.push({
                type: 'category', data: dates, gridIndex: i + 1,
                axisLabel: { show: i === subCount - 1, color: '#89a1b5' },
                axisTick: { show: false },
                axisLine: { lineStyle: { color: 'rgba(146, 188, 220, 0.34)' } }
            });
            yAxes.push({
                scale: true,
                gridIndex: i + 1,
                splitNumber: 3,
                axisLabel: { color: '#7d93a5', fontSize: 10 },
                axisLine: { show: false },
                axisTick: { show: false },
                splitLine: { show: true, lineStyle: { color: 'rgba(121, 166, 200, 0.12)', type: 'dashed' } }
            });
            topOffset += subHeight + subGap;
        });

        const series = [{
            name: 'K线', type: 'candlestick', xAxisIndex: 0, yAxisIndex: 0, data: ohlc,
            itemStyle: {
                color: '#ff6a6a',
                color0: '#4ee38c',
                borderColor: '#ff6a6a',
                borderColor0: '#4ee38c'
            }
        }];

        let colorIdx = 0;
        overlays.forEach((ov) => {
            const c = INDICATOR_COLORS[colorIdx++ % INDICATOR_COLORS.length];
            series.push({
                name: ov.name || '',
                type: ov.type || 'line',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: ov.data || [],
                showSymbol: false,
                lineStyle: { width: 1.4, color: c },
                itemStyle: { color: c },
                emphasis: { focus: 'series' }
            });
        });

        if (marks.length > 0) {
            series.push({
                name: '标记',
                type: 'scatter',
                xAxisIndex: 0,
                yAxisIndex: 0,
                data: marks.map((m) => ({
                    value: [m.coord[0], m.coord[1]],
                    label: {
                        show: true,
                        position: m.position || 'top',
                        formatter: String(m.value || ''),
                        fontSize: 12,
                        fontWeight: 'bold',
                        color: '#eaf5ff'
                    },
                    itemStyle: { color: 'transparent' },
                    symbol: 'circle',
                    symbolSize: 1
                })),
                symbolSize: 1,
                z: 12
            });
        }

        subCharts.forEach((sub, i) => {
            (sub.series || []).forEach((s) => {
                const c = INDICATOR_COLORS[colorIdx++ % INDICATOR_COLORS.length];
                const item = {
                    name: s.name || '',
                    type: s.type || 'line',
                    xAxisIndex: i + 1,
                    yAxisIndex: i + 1,
                    data: s.data || [],
                    showSymbol: false,
                    lineStyle: { width: 1.2, color: c },
                    itemStyle: { color: c }
                };
                if (s.type === 'bar') {
                    item.itemStyle = {
                        color: function (params) {
                            return params.value > 0 ? '#ff7575' : '#4ee38c';
                        }
                    };
                }
                series.push(item);
            });
        });

        const xAxisIndices = xAxes.map((_, i) => i);

        return {
            animationDuration: 420,
            animationEasing: 'cubicOut',
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'cross',
                    label: { backgroundColor: 'rgba(31, 49, 67, 0.9)' }
                },
                backgroundColor: 'rgba(7, 16, 28, 0.92)',
                borderColor: 'rgba(130, 184, 227, 0.35)',
                borderWidth: 1,
                padding: 10,
                textStyle: { color: '#dbecff' }
            },
            axisPointer: {
                link: [{ xAxisIndex: 'all' }],
                label: { backgroundColor: '#35556f' }
            },
            toolbox: {
                feature: { dataZoom: { yAxisIndex: 'none' }, restore: {}, saveAsImage: {} },
                iconStyle: { borderColor: '#8aa2b5' },
                right: 8
            },
            grid: grids,
            xAxis: xAxes,
            yAxis: yAxes,
            series: series,
            dataZoom: [
                { type: 'inside', xAxisIndex: xAxisIndices, start: 80, end: 100 },
                {
                    show: true,
                    type: 'slider',
                    xAxisIndex: xAxisIndices,
                    top: '93%',
                    height: '5%',
                    start: 80,
                    end: 100,
                    borderColor: 'rgba(130, 184, 227, 0.35)',
                    fillerColor: 'rgba(46, 211, 255, 0.24)',
                    textStyle: { color: '#89a1b5' },
                    handleStyle: { color: '#2ed3ff' },
                    moveHandleStyle: { color: '#2ed3ff' },
                    emphasis: { moveHandleStyle: { color: '#67e3ff' } }
                }
            ]
        };
    }

    function applySnapshot(rawData) {
        if (!rawData || !rawData.instruments) return;
        currentData = rawData;
        lastSnapshotAtMs = Date.now();

        document.getElementById('update-time').textContent = '最后更新: ' + (rawData.timestamp || '-');
        document.getElementById('variant-name').textContent = rawData.variant || '-';
        document.getElementById('stat-symbol-count').textContent = Object.keys(rawData.instruments || {}).length;
        document.getElementById('stat-order-count').textContent = (rawData.orders || []).length;
        document.getElementById('stat-position-count').textContent = (rawData.positions || []).length;

        updateMonthSelect(rawData.instruments);
        updateSymbolSelect();
        updateChartFromCache();
        renderOrders(rawData.orders);
        renderPositions(rawData.positions);
        setFreshnessState(true);
        updateSnapshotLag();
    }

    function subscribeCurrentVariant() {
        if (!socket || !socket.connected) return;
        const sel = document.getElementById('strategy-select');
        const variant = sel.value;
        if (!variant) return;
        try {
            socket.emit('subscribe', { variant: variant });
        } catch (e) {}
    }

    function initSocket() {
        if (typeof io === 'undefined') return;
        try {
            socket = io();
        } catch (e) {
            socket = null;
            return;
        }

        socket.on('connect', function () {
            subscribeCurrentVariant();
            setFreshnessState(true);
        });

        socket.on('disconnect', function () {
            setFreshnessState(false);
        });

        socket.on('snapshot_update', function (data) {
            const sel = document.getElementById('strategy-select');
            if (data && data.variant === sel.value) applySnapshot(data);
        });
    }

    async function loadStrategies() {
        try {
            const resp = await axios.get('/api/strategies');
            const strategies = resp.data || [];
            const sel = document.getElementById('strategy-select');
            sel.innerHTML = '';

            if (strategies.length === 0) {
                sel.innerHTML = '<option value="">未找到数据</option>';
                return;
            }

            strategies.forEach((s) => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.text = s;
                sel.add(opt);
            });

            if (window.INIT_VARIANT && strategies.includes(window.INIT_VARIANT)) {
                sel.value = window.INIT_VARIANT;
            }

            fetchData();
            sel.addEventListener('change', function () {
                document.getElementById('month-select').innerHTML = '<option value="all">所有月份</option>';
                document.getElementById('symbol-select').innerHTML = '<option value="">所有标的</option>';
                currentData = null;
                fetchData();
            });

            document.getElementById('month-select').addEventListener('change', function () {
                updateSymbolSelect();
                updateChartFromCache();
            });

            document.getElementById('symbol-select').addEventListener('change', updateChartFromCache);
        } catch (e) {
            document.getElementById('strategy-select').innerHTML = '<option value="">加载失败</option>';
        }
    }

    async function fetchData() {
        const sel = document.getElementById('strategy-select');
        if (!sel.value) return;

        try {
            const resp = await axios.get('/api/data/' + sel.value);
            applySnapshot(resp.data);
            subscribeCurrentVariant();
        } catch (e) {
            setFreshnessState(false);
            console.error('获取数据错误:', e);
        }
    }

    function updateMonthSelect(instruments) {
        const monthSelect = document.getElementById('month-select');
        const current = monthSelect.value;

        const months = new Set();
        Object.values(instruments).forEach((inst) => {
            if (inst.delivery_month) months.add(inst.delivery_month);
        });

        const sorted = Array.from(months).sort();
        const previous = Array.from(monthSelect.options).map((o) => o.value).filter((v) => v !== 'all');
        if (JSON.stringify(previous) === JSON.stringify(sorted)) return;

        monthSelect.innerHTML = '<option value="all">所有月份</option>';
        sorted.forEach((m) => {
            const option = document.createElement('option');
            option.value = m;
            option.text = m;
            monthSelect.add(option);
        });

        if (sorted.includes(current)) monthSelect.value = current;
    }

    function updateSymbolSelect() {
        if (!currentData || !currentData.instruments) return;

        const monthFilter = document.getElementById('month-select').value;
        const symbolSelect = document.getElementById('symbol-select');
        const current = symbolSelect.value;

        const filtered = Object.keys(currentData.instruments).filter((sym) => {
            return monthFilter === 'all' || currentData.instruments[sym].delivery_month === monthFilter;
        }).sort();

        const previous = Array.from(symbolSelect.options).map((o) => o.value);
        if (JSON.stringify(previous) === JSON.stringify(filtered)) return;

        symbolSelect.innerHTML = '';
        if (filtered.length === 0) {
            symbolSelect.innerHTML = '<option value="">无匹配标的</option>';
            return;
        }

        filtered.forEach((sym) => {
            const option = document.createElement('option');
            option.value = sym;
            option.text = sym;
            symbolSelect.add(option);
        });

        symbolSelect.value = filtered.includes(current) ? current : filtered[0];
    }

    function updateChartFromCache() {
        if (!currentData || !currentData.instruments) return;

        const symbol = document.getElementById('symbol-select').value;
        if (!symbol || !currentData.instruments[symbol]) {
            myChart.clear();
            return;
        }

        myChart.clear();
        myChart.setOption(buildChartOption(currentData.instruments[symbol]), true);
    }

    function normalizeDirection(direction) {
        if (direction === 'Long') return '多';
        if (direction === 'Short') return '空';
        return direction || '-';
    }

    function normalizeOffset(offset) {
        if (offset === 'Open') return '开';
        if (offset === 'Close') return '平';
        if (offset === 'CloseToday') return '平今';
        return offset || '-';
    }

    function getStatusClass(status) {
        const text = String(status || '').toLowerCase();
        if (!text) return 'status-live';
        if (text.includes('alltraded') || text.includes('filled') || text.includes('成交')) return 'status-filled';
        if (text.includes('cancel') || text.includes('撤单')) return 'status-cancel';
        if (text.includes('reject') || text.includes('fail') || text.includes('error') || text.includes('拒绝')) return 'status-reject';
        return 'status-live';
    }

    function renderOrders(orders) {
        const tbody = document.getElementById('order-list');
        if (!orders || orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-row">无活动订单</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        orders.forEach((o) => {
            const tr = document.createElement('tr');
            const directionClass = (o.direction || '').includes('Short') ? 'text-danger' : 'text-success';
            const directionText = normalizeDirection(o.direction);
            const offsetText = normalizeOffset(o.offset);
            const orderId = o.vt_orderid || '';
            const displayOrderId = orderId.includes('.') ? orderId.split('.')[0] : orderId;
            const statusClass = getStatusClass(o.status);

            tr.innerHTML =
                '<td title="' + orderId + '">' + displayOrderId + '</td>' +
                '<td class="row-direction ' + directionClass + '">' + directionText + '/' + offsetText + '</td>' +
                '<td>' + (o.price ?? '-') + '</td>' +
                '<td>' + (o.volume ?? '-') + '</td>' +
                '<td><span class="status-tag ' + statusClass + '">' + (o.status || '-') + '</span></td>';

            tbody.appendChild(tr);
        });
    }

    function renderPositions(positions) {
        const tbody = document.getElementById('position-list');
        if (!positions || positions.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-row">无持仓</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        positions.forEach((p) => {
            const tr = document.createElement('tr');
            const pnl = Number(p.pnl || 0);
            const pnlClass = pnl >= 0 ? 'text-success' : 'text-danger';

            tr.innerHTML =
                '<td title="' + (p.vt_symbol || '') + '">' + (p.vt_symbol || '-') + '</td>' +
                '<td class="row-direction">' + normalizeDirection(p.direction) + '</td>' +
                '<td>' + (p.volume ?? 0) + '</td>' +
                '<td class="' + pnlClass + '">' + pnl.toFixed(2) + '</td>';
            tbody.appendChild(tr);
        });
    }

    window.addEventListener('resize', function () {
        myChart.resize();
    });

    const pollLabel = document.getElementById('poll-interval');
    if (pollLabel) pollLabel.textContent = (Math.round(FRONT_POLL_MS / 100) / 10) + 's';

    const autoLabel = document.getElementById('auto-refresh-label');
    if (autoLabel) autoLabel.textContent = '自动刷新 (' + (Math.round(FRONT_POLL_MS / 100) / 10) + 's)';

    setFreshnessState(false);
    loadStrategies();
    initSocket();

    setInterval(function () {
        const autoRefresh = document.getElementById('auto-refresh');
        if (!autoRefresh || !autoRefresh.checked) return;

        const stale = !lastSnapshotAtMs || (Date.now() - lastSnapshotAtMs > FRONT_STALE_MS);
        if (!socket || !socket.connected || stale) fetchData();

        setFreshnessState(!stale);
        updateSnapshotLag();
    }, FRONT_POLL_MS);
</script>
</body>
</html>
